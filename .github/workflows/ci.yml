name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  ci:
    name: Quality and database checks
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check formatting
        run: npm run format:check

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Start local Supabase
        run: npm run supabase:start

      - name: Reset local database twice
        run: |
          npm run supabase:reset
          npm run supabase:reset

      - name: Run database tests
        run: npm run db:test

      - name: Verify local migration history
        shell: bash
        run: |
          migration_list="$(npx supabase migration list --local)"
          printf '%s\n' "$migration_list"

          for migration in 20260718210437 20260718230000; do
            if ! grep -Fq "$migration" <<<"$migration_list"; then
              printf 'ERROR: Expected local migration %s is absent.\n' "$migration" >&2
              exit 1
            fi
          done

      - name: Stop local Supabase
        if: ${{ always() }}
        continue-on-error: true
        run: npm run supabase:stop
